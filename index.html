<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI背景移除工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 AI背景移除</h1>
        <p class="subtitle">一键去除图片背景，快速生成透明图</p>
        
        <div class="auth-section" id="authSection">
            <button id="loginBtn" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                使用 Google 登录
            </button>
            <p class="auth-note">登录后可使用背景移除功能</p>
        </div>

        <div class="user-info" id="userInfo" style="display:none;">
            <img id="userAvatar" class="avatar" alt="用户头像">
            <span id="userName"></span>
            <button id="logoutBtn" class="btn-logout">退出</button>
        </div>
        
        <div class="upload-area" id="uploadArea" style="display:none;">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p>点击或拖拽图片到此处</p>
                <span>支持 JPG、PNG 格式</span>
            </div>
        </div>

        <div class="result-area" id="resultArea" style="display:none;">
            <div class="image-compare">
                <div class="image-box">
                    <h3>原图</h3>
                    <img id="originalImg" alt="原图">
                </div>
                <div class="image-box">
                    <h3>去背景后</h3>
                    <img id="resultImg" alt="结果">
                </div>
            </div>
            <div class="actions">
                <button id="downloadBtn" class="btn-primary">下载图片</button>
                <button id="resetBtn" class="btn-secondary">重新上传</button>
            </div>
        </div>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>正在处理中...</p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
